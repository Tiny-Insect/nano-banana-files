appId: com.lumendust.app
productName: LumenDust
directories:
  output: release
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
win:
  target:
    - nsis
    - portable
  icon: public/icon.ico
portable:
  artifactName: LumenDust-Portable.exe
files:
  - dist/**/*
  - electron/**/*
  - public/icon.png
